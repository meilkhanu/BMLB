name = "my-website"
compatibility_date = "2026-04-25"
compatibility_flags = ["nodejs_compat"]

# 前端页面配置（Pages）
[site]
bucket = "./dist"

# D1 数据库（结构化数据，如文章、台账）
[[d1_databases]]
binding = "DB"                    # 代码里用 env.DB 访问
database_name = "my-site-db"      # 数据库名字
database_id = "placeholder"       # 后面会换成真实 ID

# KV 命名空间（配置、计数器等键值对）
[[kv_namespaces]]
binding = "CACHE"                 # 代码里用 env.CACHE 访问
id = "placeholder"                # 后面会换成真实 ID
