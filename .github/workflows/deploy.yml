name: Deploy to ECS

on:
  push:
    branches: [isNode]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          password: ${{ secrets.ECS_PASSWORD }}
          script: |
            set -e
            cd /var/www/bmlb

            echo "=== Pull 最新代码 ==="
            git reset --hard HEAD
            git clean -fd
            git fetch origin isNode
            git checkout -B isNode origin/isNode

            echo "=== 写入环境变量 ==="
            cat > .env << 'EOF'
R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}
R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}
CLOUDFLARE_ACCOUNT_ID=cd4393394949ae27ca79e9dfc0263f3c
EOF

            echo "=== 安装依赖 ==="
            npm install --legacy-peer-deps

            echo "=== 构建 ==="
            DEPLOY_TARGET=ecs npx astro build

            echo "=== 配置 nginx 静态文件 ==="
            cat > /etc/nginx/conf.d/bmlb.conf << 'NGINX'
server {
    listen 80;
    server_name _;

    location /images/ { root /var/www/bmlb/public; }
    location /uploads/ { root /var/www/bmlb/public; }

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
NGINX
            nginx -t && systemctl reload nginx || true

            echo "=== 重启服务 ==="
            pm2 restart bmlb --update-env

            echo "=== 部署完成 ==="
            pm2 list
