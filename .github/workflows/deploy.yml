name: Deploy to ECS

on:
  push:
    branches: [isNode]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          password: ${{ secrets.ECS_PASSWORD }}
          script: |
            set -e
            cd /var/www/bmlb

            echo "=== Pull 最新代码 ==="
            git reset --hard HEAD
            git clean -fd -e data
            git fetch origin isNode
            git checkout -B isNode origin/isNode

            echo "=== 写入环境变量 ==="
            echo "R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}" > .env
            echo "R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}" >> .env
            echo "CLOUDFLARE_ACCOUNT_ID=cd4393394949ae27ca79e9dfc0263f3c" >> .env

            echo "=== 安装依赖 ==="
            npm install --legacy-peer-deps

            echo "=== 构建 ==="
            DEPLOY_TARGET=ecs npx astro build

            echo "=== 重启服务 ==="
            pm2 start ecosystem.config.cjs || pm2 restart bmlb

            echo "=== 部署完成 ==="
            pm2 list
